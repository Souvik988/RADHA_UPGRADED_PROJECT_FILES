name: radha_mobile
description: "RADHA Mobile App - Retail Assistant for Data, Health & Audits."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0
  # retrofit pinned to 4.4.x: retrofit 4.5+ adds `Parser.DartMappable` which
  # the 9.x generator doesn't switch on, breaking codegen.
  retrofit: '>=4.4.1 <4.5.0'
  dio_smart_retry: ^7.0.1
  connectivity_plus: ^6.0.5

  # Codegen runtime annotations
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Local persistence
  drift: ^2.20.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Camera + on-device ML
  mobile_scanner: ^5.2.3
  google_mlkit_text_recognition: ^0.13.1

  # Utilities
  intl: ^0.20.2
  package_info_plus: ^8.0.2
  uuid: ^4.4.0

  # UI primitives
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  pinput: ^5.0.0
  share_plus: ^10.0.2
  table_calendar: ^3.1.2
  google_fonts: ^6.2.1

  # External URL launching (mailto:, tel:, https in external browser)
  # used by the Support / Feedback screen (FE-37) and Settings about
  # links (Terms, Privacy). Heavy webview packages are intentionally
  # omitted in V1 — external_application mode is sufficient.
  url_launcher: ^6.3.0

  # Payments — Razorpay Standard Checkout (UPI / cards / netbanking).
  # Plugin auto-registers its activity on Android; needs INTERNET permission
  # (already declared by the Flutter framework).
  # 1.4.5 declares an android `namespace` and drops the legacy Registrar API,
  # BUT it pulls in two com.razorpay native modules (standard-core 1.7.12 +
  # core 1.0.13) that share the `com.razorpay` namespace — AGP's manifest
  # merger rejects that. Temporarily disabled for an on-device demo build;
  # checkout sheet is stubbed (see razorpay_checkout_sheet.dart). Re-enable +
  # resolve the transitive namespace clash before shipping.
  # razorpay_flutter: ^1.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.20.0
  json_serializable: ^6.8.0
  # retrofit_generator >= 9.1.7 is required for analyzer compatibility on
  # Dart 3.12 (earlier patches required the removed `_macros` SDK package).
  retrofit_generator: '>=9.1.7 <9.2.0'
  freezed: ^2.5.7

  # Testing
  mocktail: ^1.0.4
  http_mock_adapter: ^0.6.1

  # Local-only env loader (used by tooling/test harnesses, never bundled
  # into release builds). Listed dev-side per the foundation task spec.
  flutter_dotenv: ^5.2.1

  # Brand asset generators (Task 21). These run at build-time only and
  # write into android/ios/web; they are never bundled into the app.
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    # ── v1 — original assets (preserved, do not delete) ──────────────────
    - assets/v1/brand/
    # ── v2 — upgraded RADHA visual system (Bible v2.1) ───────────────────
    - assets/v2/character/mor/
    - assets/v2/character/mor/parts/
    - assets/v2/character/mor/static/
    - assets/v2/character/humans/
    - assets/v2/icons/
    - assets/v2/illustration/
    - assets/v2/illustrations/
    - assets/v2/mockup/
    - assets/v2/lottie/
    - assets/v2/rive/
    # ── legacy flat paths (kept for backward compat with existing code) ──
    - assets/brand/

# ---------------------------------------------------------------------------
# Brand asset generators (Task 21)
# ---------------------------------------------------------------------------
# Run with:
#   flutter pub run flutter_launcher_icons
#   flutter pub run flutter_native_splash:create
#
# Brand color: orange #EA580C (see lib/design/tokens.dart).

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/brand/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFBF5"
  adaptive_icon_foreground: "assets/brand/icon_foreground.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/brand/icon.png"
    background_color: "#FFFBF5"
    theme_color: "#EA580C"

flutter_native_splash:
  color: "#FFFBF5"
  image: "assets/brand/splash.png"
  android_12:
    color: "#FFFBF5"
    image: "assets/brand/splash.png"
  android: true
  ios: true
  web: false
