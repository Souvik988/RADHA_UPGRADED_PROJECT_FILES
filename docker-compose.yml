# RADHA local dev stack — Postgres + Redis.
#
# Usage from the repo root (cmd):
#   docker compose up -d                 # start in background
#   docker compose ps                    # check status
#   docker compose logs -f postgres      # tail logs
#   docker compose down                  # stop (data persists)
#   docker compose down -v               # stop + delete volumes (full wipe)
#
# Both services are reachable from your host machine on
# 5433 (Postgres) and 6380 (Redis). We deliberately avoid the default
# 5432 / 6379 so this stack doesn't fight any local Postgres / Redis
# install that's already on the standard ports.
# The NestJS app's .env.development is configured to match these.

services:
  postgres:
    image: postgres:16-alpine
    container_name: radha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: radha
      POSTGRES_PASSWORD: radha_dev_password
      POSTGRES_DB: radha_dev
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    ports:
      - '5433:5432'
    volumes:
      - radha-pg-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U radha -d radha_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: radha-redis
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    ports:
      - '6380:6379'
    volumes:
      - radha-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  radha-pg-data:
  radha-redis-data:
