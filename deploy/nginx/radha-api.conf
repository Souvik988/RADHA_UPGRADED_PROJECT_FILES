# RADHA API — nginx reverse proxy + TLS for the EC2 host.
#
# Put this at /etc/nginx/sites-available/radha-api.conf, symlink into
# sites-enabled, replace api.YOURDOMAIN.com, then run certbot (see DEPLOY_AWS.md)
# to obtain + wire the Let's Encrypt certificate. nginx is the only thing
# listening on the public interface; it proxies to the api container on
# 127.0.0.1:3000.

# Redirect all HTTP → HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name api.YOURDOMAIN.com;

    # Allow the ACME http-01 challenge through before the redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.YOURDOMAIN.com;

    # certbot fills these in (or point them at your managed cert).
    ssl_certificate     /etc/letsencrypt/live/api.YOURDOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.YOURDOMAIN.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers (helmet also sets app-level ones).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;

    # Uploads (label photos, EAN lists). Keep in step with the app's limits.
    client_max_body_size 15m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # Liveness probe (handy for external uptime monitors).
    location = /api/v1/health {
        proxy_pass http://127.0.0.1:3000/api/v1/health;
        access_log off;
    }
}
