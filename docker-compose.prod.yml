# RADHA production stack for a single EC2 host.
#
# Topology (per the chosen architecture): the three NestJS processes run here;
# Postgres lives on RDS and Redis on ElastiCache (configured via
# radha_backend/.env.production — NOT in this file). nginx + TLS terminate in front of
# `api` (see deploy/nginx/radha-api.conf); only nginx is public.
#
#   docker compose -f docker-compose.prod.yml --env-file radha_backend/.env.production up -d --build
#
# The image is built once (by `api`) and reused by worker + scheduler.

name: radha

x-server-common: &server-common
  image: radha-server:latest
  env_file:
    - radha_backend/.env.production
  environment:
    NODE_ENV: production
  restart: always
  # Tune to the instance; these are safe defaults for a t3.medium-ish host.
  deploy:
    resources:
      limits:
        memory: 768M

services:
  api:
    <<: *server-common
    build:
      context: .
      dockerfile: Dockerfile
    command: ['node', 'dist/main.api.js']
    # Bind to loopback only — nginx is the sole public entry point.
    ports:
      - '127.0.0.1:3000:3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  worker:
    <<: *server-common
    command: ['node', 'dist/main.worker.js']
    depends_on:
      api:
        condition: service_started

  scheduler:
    <<: *server-common
    command: ['node', 'dist/main.scheduler.js']
    depends_on:
      api:
        condition: service_started
